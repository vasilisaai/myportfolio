<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }}</title>
</head>
<body>
    <h1>{{ post.title }}</h1>
    <p><strong>Posted on:</strong> {{ post.date }}</p>
    <img src="{{ post.img }}" alt="Post image">
    <p>{{ post.text }}</p>
    <a href="{{ url_for('index') }}">Back to Homepage</a>
</body>
</html>
