<!DOCTYPE html>
<html lang="en">
<head>
     <!-- REQs -->
     <meta charset="utf-8">
     <meta name="viewport" content="width=device-width, initial-scale=1">
     <link rel="icon" href="data:,">
 
     <!-- JQUERY -->
     <script src="http://code.jquery.com/jquery-3.3.1.min.js"></script>
     <script src="https://code.jquery.com/ui/1.12.0/jquery-ui.min.js"></script>  
     <link rel="stylesheet" href="http://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
 
     <!-- BOOTSTRAP CSS -->
     <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
     <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">

</head>
<body>
    <div class="name-box">
        <div class="name">Vasilisa Ioukhnovets</div>
    </div>
    <div class="box">
        <div class = "box-scroll">
            <div class="post-feed">
                <!-- LOOP THROUGH POSTS AND LOAD -->
                {% for post in posts %}
                <div class="post-preview">
                    <div class="featured-img">
                        <img src="{{ url_for('get_image', filename=post.img) }}" alt="Post Image" width="100%" object-fit="contain">
                    </div>
                    <div class="caption">{{ post.caption | safe }}</div>
                    <a class="title" href="{{ url_for('show_post', post_filename=post.filename) }}">{{ post.title | safe }}</a>
                    <div>{{ post.preview_html | safe }}</div>  <!-- Display preview as HTML -->
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
