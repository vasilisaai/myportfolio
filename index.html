<!DOCTYPE html>
<html lang="en">
<head>
     <!-- REQs -->
     <meta charset="utf-8">
     <meta name="viewport" content="width=device-width, initial-scale=1">
     <link rel="icon" href="data:,">
 
     <!-- JQUERY -->
     <script src="http://code.jquery.com/jquery-3.3.1.min.js"></script>
     <script src="https://code.jquery.com/ui/1.12.0/jquery-ui.min.js"></script>  
     <link rel="stylesheet" href="http://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
 
     <!-- BOOTSTRAP CSS -->
     <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
     <link rel="stylesheet" href="static/main.css">

     <style>
        body {
    max-width: 100vw;  /* Full viewport width */
    height: 100vh;     /* Full viewport height */
    margin: 0;
    padding: 0;
    background-color: #f4f4f4;
    overflow: scroll;
    overscroll-behavior: none;
    display: flex;
    flex-direction: column; /* Stack elements vertically */
    justify-content: flex-start;
    align-items: center;    /* Center the content horizontally */
}

.name-box {
    height: 11vw;
    display: flex;
    justify-content: center;  /* Center the content horizontally */
    align-items: center;      /* Center the content vertically */
    width: 100%;              /* Make it take up the full width */
    margin-top: 20px;         /* Adds space above the name box to separate it from the top */
}

.name {
    font-size: 10vw;
    font-family:'Times New Roman', Times, serif;
    font-style: italic;
}
.header {
    display: flex;
    align-items: center; /* Vertically aligns items */
}
.title {
    font-size: 30px;
}
.box {
    width: 800px;
    padding-left: 0px;
    padding-right: 0px;
    max-width: 100%; /* Allows it to grow to the full viewport width */
    margin: auto;
    overflow: scroll;
    border-top: 3px solid black;
    box-sizing: border-box;
    scrollbar-width: none; /* Hide scrollbar for Firefox */
    -ms-overflow-style: none; /* Hide scrollbar for IE/Edge */
}
.box-scroll {
    width: 100%;
    min-width:fit-content;
    border: 3px solid black;
    border-top: none;
    box-sizing: border-box;
    -webkit-overflow-scrolling: touch; /* Ensures smooth scrolling */
    overflow: scroll;

}
body::-webkit-scrollbar {
    display: none; /* Hide scrollbar for Chrome, Safari, and Opera */
}
.hello-text {
    text-align: center;
    font-family: "Times New Roman", Times, serif;
}
.post-box {
    border: 1px solid #ddd;
    padding: 20px;
    margin-bottom: 20px;
    background-color: black;

}
.post-preview {
    font-family:'Times New Roman', Times, serif;
    margin: 10px;
    padding: 0px;
    margin-top: 0px;
    
}
.post-all {
    height: 100%;
    font-family: 'Times New Roman', Times, serif;
    margin: 0;
    padding: 10px;
    margin-top: 0;  /* Ensure no top margin */
    padding-top: 0; /* Ensure no top padding */
    padding-bottom: 0; /* Ensure no bottom padding */
}

.post-header {
    display: flex;
    margin-bottom: 0px;

}
.post-title {
    font-size: 24px;
    margin: 0;
}
.post-date {
    color: #888;
    font-size: 14px;
}
.post-content .post-excerpt {
    font-size: 16px;
    color: #333;
}
.read-more {
    color: #007bff;
    text-decoration: none;
}
.read-more:hover {
    text-decoration: underline;
}
.featured-img {
    width: 100%;
    height: auto;
    object-fit: contain;
}


.caption {
    font-size: small;
    color: black;
}

a.title {
    font-size: large;
    color: black;
    font-family: 'Times New Roman', Times, serif;
}
.post-title {
    font-size: xx-large;
    color: black;
    font-family: 'Times New Roman', Times, serif;
}
#back-button {
    margin: 10px;
    background-color: rgb(255, 49, 39);
    border: .5px solid rgb(215, 42, 32);
    width: 25px; /* Smaller width */
    height: 25px; /* Keep the same height to maintain the circle */
    font-weight: bold;
    border-radius: 50%; /* Keeps the button round */
    transition: all 0.3s ease;
    color: rgb(189, 39, 31);
    font-size: 12px; /* Adjust font size for better fit */
    display: flex;
    justify-content: center; /* Center text horizontally */
    align-items: center; /* Center text vertically */
    text-align: center;
}

#back-button:active {
    transform: scale(0.95); /* Button shrinks slightly when clicked */
    background-color: rgb(204, 48, 40);
    color: rgb(189, 39, 31);
}
ul {
    list-style-type: none;
    padding: 0;
    width: 200px;
    background-color: #f1f1f1;
    align-items: left;

  }
  
  li a {
    display: inline-block;
    font-family: 'Times New Roman', Times, serif;
    color: #000;
    padding: 8px 16px;
    width: 100px;
    text-decoration: none;
    margin-top: 5px;
    margin-bottom: 5px;
    background-color: yellow;

  }
  
  /* Change the link color on hover */
  li a:hover {
    background-color: rgb(255, 179, 0);
    color: rgb(0, 0, 0);
    font-style: italic;
  }

.everything {
    max-width: 100vw; /* Allows it to grow to the full viewport width */
    height: 100vh;
    margin: 0;
    padding: 0;
    display: flex;    /* Use flexbox layout */
    justify-content: center;  /* Center content horizontally */
}
.tabs-container {
    position: absolute;
    top: 20px; /* Keep it aligned with the top */
    right: 0px; /* Moves it outside the box to the right */
    display: flex;
    flex-direction: column; /* Stack tabs vertically */
    gap: 10px;
    z-index: 10; /* Ensures it stays above other elements */
}

.tab {
    background: white;
    padding: 10px 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
    cursor: pointer;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
    font-weight: bold;
    white-space: nowrap; /* Prevents text from wrapping */
}

.tab:hover {
    background: #f8f9fa;
}

     </style>
</head>
<body>
    <div class="name-box">
        <div class="name">Vasilisa Ioukhnovets</div>
    </div>
    <div class="everything">
        <div class="box">
            <div class="box-scroll">
                <div class="post-feed">
                    
                    
                </div>
            </div>
        </div>
        <ul>
            <li><a href="/fashion">FASHION</a></li>
            <li><a href="/">ART</a></li>
        </ul>
    </div>
</body>
</html>
